<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Pixel</title>
    <link data-trunk rel="css" href="style.css"/>
    <link data-trunk rel="copy-dir" href="../assets"/>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Minimal startup logging
            if (window.__TAURI__) {
                console.log('🚀 Panda Pixel starting (Tauri mode)');
            } else {
                console.log('🚀 Panda Pixel starting (browser mode)');
            }

            // Keyboard shortcut to open devtools (F12 or Ctrl+Shift+I)
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                    e.preventDefault();
                    if (window.__TAURI__) {
                        const invoke = window.__TAURI__.core?.invoke ||
                                      window.__TAURI__.tauri?.invoke ||
                                      window.__TAURI__.invoke;
                        if (invoke) {
                            invoke('open_devtools').catch(err => {
                                console.error('Failed to open devtools:', err);
                                console.log('💡 Tip: Devtools should open automatically in debug mode');
                            });
                        }
                    } else {
                        console.log('💡 Tauri API not available - running in browser mode');
                    }
                }
            });

            // Set up ResizeObserver for window auto-resize
            const container = document.querySelector('.container');
            if (container) {
                const resizeObserver = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const rect = entry.contentRect;
                        const width = rect.width;
                        const height = rect.height;

                        // Silent resize logging

                        // Call Tauri command if available
                        if (window.__TAURI__) {
                            const invoke = window.__TAURI__.core?.invoke ||
                                          window.__TAURI__.tauri?.invoke ||
                                          window.__TAURI__.invoke;
                            if (invoke) {
                                invoke('resize_window', {
                                    width: width,
                                    height: height
                                }).catch(err => console.error('Resize error:', err));
                            }
                        }
                    }
                });

                resizeObserver.observe(container);
            }

            // Set up drag & drop events
            if (window.__TAURI__) {
                // Tauri native drag & drop
                const eventApi = window.__TAURI__.event || window.__TAURI__.core?.event;
                if (eventApi?.listen) {
                    // Drag & drop listeners set up silently

                    // Listen for drag-drop event (files dropped on window)
                    eventApi.listen('tauri://drag-drop', (event) => {
                        if (event.payload?.paths && Array.isArray(event.payload.paths)) {
                            const filePaths = event.payload.paths;
                            const sample = filePaths.slice(0, 3).map(p => {
                                const parts = p.split(/[/\\]/);
                                return parts[parts.length - 1] || p;
                            });
                            console.log(`📦 drag-drop: ${filePaths.length} files (sample: ${sample.join(', ')})`);

                            // Call Tauri command to process dropped files
                            const invoke = window.__TAURI__.core?.invoke ||
                                          window.__TAURI__.tauri?.invoke ||
                                          window.__TAURI__.invoke;
                            if (invoke) {
                                invoke('handle_dropped_files', { filePaths: filePaths })
                                    .then((files) => {
                                        console.log(`✅ Processed ${files.length} dropped files`);
                                        window.dispatchEvent(new CustomEvent('files-dropped', {
                                            detail: { files: files }
                                        }));
                                    })
                                    .catch(err => {
                                        console.error('❌ Failed to process dropped files:', err);
                                    });
                            }
                        }
                    }).catch(() => {});

                    // Only log drag-enter (not drag-over spam)
                    let dragEnterCount = 0;
                    eventApi.listen('tauri://drag-enter', (e) => {
                        const paths = e.payload?.paths || [];
                        const sample = paths.slice(0, 3).map(p => {
                            const parts = p.split(/[/\\]/);
                            return parts[parts.length - 1] || p;
                        });
                        console.log(`📥 drag-enter: ${paths.length} files (sample: ${sample.join(', ')})`);
                    }).catch(() => {});
                } else {
                    console.log('⚠️ Tauri event API not available');
                }
            } else {
                // Browser: bundle downloads as real ZIP (used by WASM HttpBackend)
                window.__pandaZipBuildAndDownload = async function (zipFilename, entries) {
                    if (typeof JSZip === 'undefined') {
                        throw new Error('JSZip failed to load');
                    }
                    const zip = new JSZip();
                    for (const ent of entries) {
                        zip.file(ent.name, ent.data);
                    }
                    const blob = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = zipFilename;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                };

                // Browser drag & drop: highlight upload zone while pointer is over it
                document.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const el = document.querySelector('.upload-section');
                    if (!el || el.classList.contains('disabled')) {
                        el?.classList.remove('drag-over');
                        return;
                    }
                    const r = el.getBoundingClientRect();
                    const inside = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
                    el.classList.toggle('drag-over', inside);
                });

                document.addEventListener('dragend', () => {
                    document.querySelector('.upload-section')?.classList.remove('drag-over');
                });

                document.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    document.querySelector('.upload-section')?.classList.remove('drag-over');
                    
                    const files = e.dataTransfer?.files;
                    if (!files || files.length === 0) return;

                    const fileList = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        fileList.push({
                            path: `browser://${file.name}`,
                            name: file.name,
                            size: file.size,
                            file: file // Keep reference for reading
                        });
                    }

                    console.log(`📦 Browser drag-drop: ${fileList.length} files (sample: ${fileList.slice(0, 3).map(f => f.name).join(', ')})`);
                    
                    // Store files globally for later access
                    window.__BROWSER_DROPPED_FILES = fileList;
                    
                    // Dispatch event
                    window.dispatchEvent(new CustomEvent('files-dropped', {
                        detail: { files: fileList.map(f => ({ path: f.path, name: f.name, size: f.size })) }
                    }));
                });
            }
        });
    </script>
</body>
</html>
