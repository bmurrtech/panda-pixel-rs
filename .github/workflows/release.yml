name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TRUNK_VERSION: trunk@0.21.14
  TAURI_CLI_VERSION: tauri-cli@2.9.1
  PRODUCT_NAME: Panda Pixel
  # Trunk 0.21's `--no-color` flag is clap-derive-bound to NO_COLOR and requires
  # a strict `true|false` value when the env var is set. An empty string (`""`)
  # makes clap reject parsing ("a value is required for '--no-color'"). The
  # Makefile uses `env -u NO_COLOR` to truly UNSET locally; in GitHub Actions
  # workflow-level `env:` re-applies per step, so we instead pin a valid bool.
  # `true` = colors off in CI logs (clean) and satisfies clap's parser.
  NO_COLOR: "true"

jobs:
  publish:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Universal)
            platform: macos
            cache_key: macos-universal
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
            default_args: --target universal-apple-darwin --bundles dmg
            asset_pattern: Panda-Pixel_[version]_macos_universal[ext]

          - os: macos-latest
            label: macOS (Apple Silicon)
            platform: macos
            cache_key: macos-apple-silicon
            rust_targets: aarch64-apple-darwin
            default_args: --target aarch64-apple-darwin --bundles dmg
            asset_pattern: Panda-Pixel_[version]_macos_apple_silicon[ext]

          - os: macos-latest
            label: macOS (Intel)
            platform: macos
            cache_key: macos-intel
            rust_targets: x86_64-apple-darwin
            default_args: --target x86_64-apple-darwin --bundles dmg
            asset_pattern: Panda-Pixel_[version]_macos_intel_silicon[ext]

          - os: ubuntu-latest
            label: Linux (x86_64)
            platform: linux
            cache_key: linux-x86_64
            rust_targets: ""
            default_args: --bundles appimage,deb,rpm
            asset_pattern: Panda-Pixel_[version]_linux_[arch][ext]

          - os: windows-latest
            label: Windows (x86_64)
            platform: windows
            cache_key: windows-x86_64
            rust_targets: ""
            default_args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            asset_pattern: Panda-Pixel_[version]_windows_[arch][_setup][ext]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive tag metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: Tag '$tag' must follow vMAJOR.MINOR.PATCH[-PRERELEASE]" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "$version" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Validate workspace versions match tag
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ steps.meta.outputs.version }}"
          cargo_version="$(grep -m1 '^version = "' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          tauri_version="$(grep -m1 '"version":' src-tauri/tauri.conf.json | sed -E 's/.*"version": "([^"]+)".*/\1/')"

          if [[ -z "$cargo_version" || -z "$tauri_version" ]]; then
            echo "ERROR: Failed to parse versions from manifests." >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$tauri_version" ]]; then
            echo "ERROR: Version drift Cargo.toml=$cargo_version tauri.conf.json=$tauri_version" >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$expected" ]]; then
            echo "ERROR: Tag mismatch tag=$expected manifest=$cargo_version" >&2
            exit 1
          fi
          echo "Validated version: $cargo_version"

      - name: Select bundle args (Windows prerelease -> NSIS only)
        id: args
        shell: bash
        run: |
          set -euo pipefail
          args='${{ matrix.default_args }}'
          if [[ '${{ matrix.platform }}' == 'windows' && '${{ steps.meta.outputs.is_prerelease }}' == 'true' ]]; then
            # WiX/MSI rejects non-numeric prerelease labels; use NSIS for prerelease tags.
            args='--target x86_64-pc-windows-msvc --bundles nsis'
          fi
          echo "value=$args" >> "$GITHUB_OUTPUT"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          targets: wasm32-unknown-unknown

      - name: Install matrix Rust targets
        if: matrix.rust_targets != ''
        shell: bash
        run: rustup target add ${{ matrix.rust_targets }}

      # `ravif` → `rav1e` enables x86_64 NASM assembly when building `x86_64-apple-darwin`
      # (Intel DMG + universal binary's Intel slice). GHA macOS images do not ship NASM;
      # without it, `rav1e`'s build script panics. Apple Silicon–only jobs skip this.
      - name: Install NASM (macOS x86_64 / universal Rav1e)
        if: runner.os == 'macOS' && contains(matrix.rust_targets, 'x86_64-apple-darwin')
        run: brew install nasm

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.cache_key }}
          cache-on-failure: true

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            nasm \
            rpm

      - name: Install Windows prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress --yes

      - name: Install Trunk
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: ${{ env.TRUNK_VERSION }}

      - name: Install Tauri CLI
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: ${{ env.TAURI_CLI_VERSION }}

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ env.PRODUCT_NAME }} v${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          generateReleaseNotes: true
          args: ${{ steps.args.outputs.value }}
          assetNamePattern: ${{ matrix.asset_pattern }}
