[build]
target = "index.html"
dist = "../../dist"
public-url = "./"

# Trunk 0.21+: hooks are a list of { stage, command, command_arguments? }
[[hooks]]
stage = "pre_build"
command = "npm"
command_arguments = ["run", "build:css"]

[serve]
# Note: addresses format may vary by Trunk version
# Using address + port for compatibility (deprecation warning is harmless)
address = "0.0.0.0"
port = 8080
open = false
# Disable live-reload for Tauri builds (prevents WebSocket placeholder spam)
reload = false

[watch]
watch = ["."]
ignore = []
